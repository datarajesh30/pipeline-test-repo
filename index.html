<!DOCTYPE html>
<html>
<head>
    <title></span></span> Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .login-box {
            width: 350px;
            padding: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #5a67d8;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div style="text-align:center;padding:15px;background:#111;color:#00ffcc;font-size:20px;font-weight:bold;">🚀 Jenkins Auto Deploy Login Page</div>

<div class="login-box">
    <h2></span></span></h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()" style="background:#ff3b7b;font-weight:bold;font-size:16px;"></span></span></button>
<p style="font-size:12px;color:gray;text-align:center;">Deployed via Jenkins CI/CD</p>
    <p class="error" id="error"></p>
</div>

<script>
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
        alert("</span></span> Successful 🚀");
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Welcome Admin 🎉</h1>";
    } else {
        document.getElementById("error").innerText = "Invalid username or password";
    }
}
</script>

</body>
</html>
<p style='text-align:center;'>Deployed via Jenkins CI/CD</p>
